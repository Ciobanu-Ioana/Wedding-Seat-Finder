<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Găsește-ți locul</title>

    <link href="https://fonts.googleapis.com/css2?family=Pinyon+Script&family=Playfair+Display:ital,wght@0,400;0,500;0,700;1,400&family=Cardo:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css" />
</head>

<body>

<div id="splash">
    <div id="splash-content">
        <div class="initials">I & V</div>
        <div class="loading-text">Se încarcă invitații...</div>
        <div class="spinner"></div>
    </div>
</div>

<div id="app" class="hidden">

    <div class="page" id="page-seat">
        <h1>Vă invităm să vă găsiți locul</h1>

        <input id="searchName" placeholder="Introduceți numele" oninput="liveSearch()">

        <div id="results"></div>
    </div>

    <div class="page hidden" id="page-floor">
        <h1>Floor Plan</h1>
        <p>(Coming soon)</p>
    </div>

    <div class="page hidden" id="page-menu">
        <h1>Meniu</h1>

        <div class="menu-carousel">

            <img id="menuImage" src="images/meniu-mancare.png" alt="Menu" class="menu-image">

            <div class="menu-controls">
                <button onclick="prevMenu()" class="arrow-btn">&#9664;</button>

                <div class="menu-dots">
                    <span id="dot0" class="dot active"></span>
                    <span id="dot1" class="dot"></span>
                </div>

                <button onclick="nextMenu()" class="arrow-btn">&#9654;</button>
            </div>

        </div>

    </div>

    <div class="bottom-nav">
        <div onclick="showPage('seat')">Găsește-ți locul</div>
        <div onclick="showPage('floor')">Planul Sălii</div>
        <div onclick="showPage('menu')">Meniu</div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
